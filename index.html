<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=windows-1253" />
<title>Hover style</title>
<style type="text/css">
    #hover {
        background-color: blue;
        margin: 10px ;
        position: relative;
        left: 200px;
        border-radius: 50%;
    }
    #test1 {
        width: 200px;
       
        position: relative;
        left: 200px;
        background-color: red;
        border-radius: 50%;

    }
    </style>

<script type="text/javascript"></script> 
</head>
<body>

<button id="hover">Κώδικας: hover style</button>

<div id="test1">
    <p>Hover over this area</p>
</div>

<script>
    document.getElementById("hover").onmouseover = function() {
       document.getElementById("hover").style.background = "red";
    }
    document.getElementById("hover").onmouseleave = function() {
       document.getElementById("hover").style.background = "yellow";
    }
    document.getElementById("test1").onmouseover = function() {
       document.getElementById("test1").style.background = "yellow";
    }
    document.getElementById("test1").onmouseleave = function() {
       document.getElementById("test1").style.background = "cyan";
    }
    document.getElementById("test1").onclick = function() {
       document.getElementById("test1").style.background = "red";
    }
// test 4666
</script>
</body>
</html>
